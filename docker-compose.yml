version: "3.8"

# =============================================================================
# MeshAnythingV2 API — Docker Compose
#
# Machine-specific config lives in .env (gitignored).
# Copy .env.example -> .env and set HF_CACHE_PATH before first run.
#
# Quick start:
#   cp .env.example .env
#   $EDITOR .env
#   docker compose up -d
#
# Rebuild after code changes:
#   docker compose up -d --build
#
# Logs:
#   docker compose logs -f meshanythingv2
#   tail -f logs/app.log
#
# Check GPU inside container:
#   docker compose exec meshanythingv2 nvidia-smi
# =============================================================================

services:
  meshanythingv2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_CUDA_ARCH_LIST: "${TORCH_CUDA_ARCH_LIST:-8.0;8.6;8.9;9.0;10.0;12.0}"
        MAX_JOBS: "${MAX_JOBS:-4}"
        http_proxy: "${HTTP_PROXY:-}"
        https_proxy: "${HTTPS_PROXY:-}"
        no_proxy: "localhost,127.0.0.1"

    image: meshanythingv2:latest
    container_name: meshanythingv2-api

    ports:
      - "${MESHANYTHING_PORT:-8192}:8192"

    volumes:
      # -- HuggingFace model cache -------------------------------------------
      - ${HF_CACHE_PATH}:/hf_cache:rw

      # -- Log persistence ----------------------------------------------------
      - ./logs:/app/logs

      # -- Generated outputs --------------------------------------------------
      - ${MESHANYTHING_OUTPUT_PATH:-./outputs}:/app/outputs:rw

    environment:
      - HF_HOME=/hf_cache
      - TRANSFORMERS_CACHE=/hf_cache
      - HUGGINGFACE_HUB_CACHE=/hf_cache

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_ID:-0}"]
              capabilities: [gpu]

    shm_size: "8gb"

    restart: unless-stopped
